<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navegación -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📚 Biblioteca</div>
            <ul class="nav-menu">
                <li class="nav-item"><a class="nav-link" id="inicio">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" id="catalogo">Catálogo de libros</a></li>
                <li class="nav-item"><a class="nav-link" id="about">Buscador avanzado</a></li>
                <li class="nav-item"><a class="nav-link" id="resenas">Reseñas</a></li>
                <li class="nav-item"><a class="nav-link" id="estadisticas">Estadísticas</a></li>
                <li class="nav-item"><a class="nav-link" id="register">Registrarse</a></li>
            </ul>
        </div>
    </nav>

    <main id="app">
        <!-- Contenido principal insertado siempre con JavaScript -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>Síguenos</h3>
                <div class="social-icons">
                    <a href="https://facebook.com" target="_blank" class="social-link facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="https://twitter.com" target="_blank" class="social-link twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="https://instagram.com" target="_blank" class="social-link instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://linkedin.com" target="_blank" class="social-link linkedin">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                </div>
            </div>
            <div class="footer-section">
                <p>&copy; 2026 Biblioteca. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>
    <script src="js/feed.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
